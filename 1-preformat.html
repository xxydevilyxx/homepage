<!DOCTYPE html>
<html>
  <head>
    <title>HTML Preformat</title>
  </head>
  <body>
    <!-- (A) BROWSERS WILL IGNORE LINE BREAKS, RENDER SINGLE LINE -->
    <p>Hello world,
    my name is John Doe.</p>

    <!-- (B) PREFORMATTED TEXT WILL RETAIN LINE BREAKS + WHITE SPACES -->
    <pre>var foo = "bar";
    var hello = "world";
    console.log(foo);
    console.log(hello);</pre>
  </body>
</html>
